<!DOCTYPE html>
<html lang="en">

<head>
    <title>Style Details</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <h1 id="title" style="text-align:center; margin-top: 80px;"></h1>

    <p style="text-align:center;" id="description"></p>

    <script src="../script.js"></script>

    <script>
        const style = localStorage.getItem("selectedStyle");

        document.getElementById("title").innerText = style;

        document.getElementById("description").innerText =
            "This is one of our premium fashion styles designed for elegance and confidence.";
    </script>

</body>

</html>
